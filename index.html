<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Tech Community</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fa;
}
.hero {
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    color: white;
    padding: 40px;
    border-radius: 10px;
}
.card {
    border-radius: 12px;
}
</style>
</head>

<body class="container mt-4">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark rounded mb-4 px-3">
    <span class="navbar-brand">Tech Community</span>
    <div class="ms-auto">
        <a href="./form.html" class="btn btn-outline-light btn-sm">Form</a>
        <a href="./gallery.html" class="btn btn-success btn-sm">Gallery</a>
    </div>
</nav>

<!-- Hero -->
<div class="hero text-center mb-4">
    <h1>Welcome to Tech Community 🚀</h1>
    <p>Tempat belajar, berbagi, dan berkembang di dunia teknologi</p>
</div>

<!-- Card Table -->
<div class="card shadow p-3">
    <h4>Data Anggota</h4>
    <table class="table table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>Nama</th>
                <th>Email</th>
                <th>Minat</th>
            </tr>
        </thead>
        <tbody id="tabelData"></tbody>
    </table>
</div>

<script>
let data = [
    {nama: "Andi", email: "andi@gmail.com", minat: "Web Development"},
    {nama: "Budi", email: "budi@gmail.com", minat: "UI/UX"}
];

let tabel = document.getElementById("tabelData");

data.forEach(d => {
    tabel.innerHTML += `
    <tr>
        <td>${d.nama}</td>
        <td>${d.email}</td>
        <td><span class="badge bg-primary">${d.minat}</span></td>
    </tr>`;
});
</script>

</body>
</html>
