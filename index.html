<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h1 class="text-center">Tech Community</h1>
    <p class="text-center">Komunitas untuk belajar dan berbagi seputar teknologi.</p>

    <!-- Navigasi -->
    <div class="text-center mb-4">
        <a href="./form.html" class="btn btn-primary">Form Anggota</a>
        <a href="./gallery.html" class="btn btn-success">Multimedia</a>
    </div>

    <!-- Tabel Data -->
    <h3>Data Anggota</h3>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Email</th>
                <th>Minat</th>
            </tr>
        </thead>
        <tbody id="tabelData"></tbody>
    </table>

<script>
let data = [
    {nama: "Andi", email: "andi@gmail.com", minat: "Web Development"},
    {nama: "Budi", email: "budi@gmail.com", minat: "UI/UX"}
];

let tabel = document.getElementById("tabelData");

data.forEach(d => {
    tabel.innerHTML += `
        <tr>
            <td>${d.nama}</td>
            <td>${d.email}</td>
            <td>${d.minat}</td>
        </tr>
    `;
});
</script>

</body>
</html>
