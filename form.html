<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Anggota</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #eef2f7; }
.card { border-radius: 12px; }
</style>
</head>

<body class="container mt-5">

<div class="card shadow p-4 col-md-6 mx-auto">
    <h3 class="text-center mb-3">Form Pendaftaran</h3>

    <form id="formData">
        <input type="text" id="nama" class="form-control mb-3" placeholder="Nama" required>
        <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

        <select id="minat" class="form-control mb-3">
            <option>Web Development</option>
            <option>UI/UX</option>
            <option>Data Science</option>
        </select>

        <button class="btn btn-primary w-100">Submit</button>
    </form>

    <div id="alertBox" class="mt-3"></div>

    <a href="./index.html" class="btn btn-secondary mt-3">Kembali</a>
</div>

<script>
let dataAnggota = [];

document.getElementById("formData").addEventListener("submit", function(e){
    e.preventDefault();

    let nama = namaInput.value;
    let email = emailInput.value;
    let minat = minatInput.value;

    dataAnggota.push({nama,email,minat});

    alertBox.innerHTML = `
    <div class="alert alert-success">
        ✔ Data berhasil ditambahkan!
    </div>`;

    this.reset();
});
</script>

</body>
</html>
