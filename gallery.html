<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Multimedia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Gallery</h2>

<!-- Gambar -->
<img id="gambar" src="https://via.placeholder.com/300" class="mb-3">
<br>
<button onclick="gantiGambar()" class="btn btn-warning">Ganti Gambar</button>

<hr>

<!-- Video -->
<iframe width="560" height="315"
src="https://www.youtube.com/embed/dQw4w9WgXcQ">
</iframe>

<hr>

<!-- Audio -->
<audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
<br><br>
<button onclick="playAudio()" class="btn btn-success">Play</button>
<button onclick="pauseAudio()" class="btn btn-danger">Pause</button>

<br><br>
<a href="./index.html" class="btn btn-secondary">Kembali</a>

<script>
function gantiGambar(){
    document.getElementById("gambar").src = "https://via.placeholder.com/300/ff0000";
    alert("Gambar diganti!");
}

let audio = document.getElementById("audio");

function playAudio(){
    audio.play();
}

function pauseAudio(){
    audio.pause();
}
</script>

</body>
</html>
