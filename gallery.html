<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f8f9fc; }
img { border-radius: 10px; }
</style>
</head>

<body class="container mt-4">

<h2 class="text-center mb-4">Multimedia</h2>

<div class="row">

<!-- Gambar -->
<div class="col-md-4 text-center">
    <img id="gambar" src="https://via.placeholder.com/300" class="img-fluid mb-2">
    <button onclick="gantiGambar()" class="btn btn-warning w-100">Ganti</button>
</div>

<!-- Video -->
<div class="col-md-4">
    <iframe class="w-100 rounded"
    height="200"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ">
    </iframe>
</div>

<!-- Audio -->
<div class="col-md-4 text-center">
    <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <button onclick="playAudio()" class="btn btn-success w-100 mb-2">Play</button>
    <button onclick="pauseAudio()" class="btn btn-danger w-100">Pause</button>
</div>

</div>

<div class="text-center mt-4">
    <a href="./index.html" class="btn btn-secondary">Kembali</a>
</div>

<script>
function gantiGambar(){
    let img = document.getElementById("gambar");
    img.src = img.src.includes("300") 
        ? "https://via.placeholder.com/300/0000ff"
        : "https://via.placeholder.com/300";
}

let audio = document.getElementById("audio");

function playAudio(){ audio.play(); }
function pauseAudio(){ audio.pause(); }
</script>

</body>
</html>
